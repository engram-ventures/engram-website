<svg width="520" height="80" viewBox="0 0 520 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Engram Ventures — Horizontal Lockup (Reversed / Dark BG) -->

  <!-- Monogram E -->
  <g transform="translate(0, 8)">
    <rect x="0" y="0" width="4" height="64" fill="#F5F1EB" rx="1"/>
    <rect x="0" y="0" width="42" height="4" fill="#F5F1EB" rx="1"/>
    <rect x="9" y="30" width="33" height="4" fill="#C96A3A" rx="1"/>
    <rect x="14" y="60" width="28" height="4" fill="#F5F1EB" rx="1"/>
  </g>

  <!-- Divider -->
  <line x1="60" y1="16" x2="60" y2="64" stroke="#2D3E4F" stroke-width="1"/>

  <!-- ENGRAM -->
  <text x="78" y="42" text-anchor="start"
        font-family="'Cormorant Garamond', 'Garamond', 'Georgia', serif"
        font-size="40" font-weight="400" letter-spacing="10" fill="#F5F1EB">ENGRAM</text>

  <!-- VENTURES -->
  <text x="80" y="64" text-anchor="start"
        font-family="'Jost', 'Montserrat', 'Helvetica Neue', sans-serif"
        font-size="13" font-weight="400" letter-spacing="7" fill="#9EABB8">VENTURES</text>
</svg>
