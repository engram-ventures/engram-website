<svg width="400" height="210" viewBox="0 0 400 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Engram Ventures — Stacked Logo (Reversed, no tagline) -->

  <!-- Monogram E -->
  <g transform="translate(168, 20)">
    <rect x="0" y="0" width="5" height="80" fill="#F5F1EB" rx="1"/>
    <rect x="0" y="0" width="53" height="5" fill="#F5F1EB" rx="1"/>
    <rect x="11" y="37.5" width="42" height="5" fill="#C96A3A" rx="1"/>
    <rect x="17" y="75" width="36" height="5" fill="#F5F1EB" rx="1"/>
  </g>

  <!-- ENGRAM -->
  <text x="200" y="155" text-anchor="middle"
        font-family="'Cormorant Garamond', 'Garamond', 'Georgia', serif"
        font-size="58" font-weight="400" letter-spacing="12" fill="#F5F1EB">ENGRAM</text>

  <!-- VENTURES -->
  <text x="200" y="190" text-anchor="middle"
        font-family="'Jost', 'Montserrat', 'Helvetica Neue', sans-serif"
        font-size="16" font-weight="400" letter-spacing="9" fill="#9EABB8">VENTURES</text>
</svg>
